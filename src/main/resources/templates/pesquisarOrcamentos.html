<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layoutPadrao}">

<head>
	<title>Oficina</title>
</head>

<section layout:fragment="conteudo">

	<div class="card">
		<div class="card-body">
			<div class="clearfix">
				<h5 class="card-title aw-titulo-panel">Pesquisa de Orçamentos</h5> 
				<a class="link-offset-2 link-offset-3-hover link-underline link-underline-opacity-0 
	  							link-underline-opacity-75-hover" href="/index">
  							Voltar para listagem
				</a>
			</div>
		</div>
		
		<div class="alert alert-danger" role="alert"> 
			<span class="bi bi-exclamation-circle-fill" aria-hidden="true"></span>
			<span class="sr-only"></span>
			   Orçamentos com mais de 30 dias serão excluídos automaticamente do sistema
		</div>	
		
		<div class="panel-body">
			<table class="table table-bordered table-striped">
				
				<thead>
					<tr>
						<th class="text-center">Número Orçamento</th>
						<th class="text-center col-md-2">Cliente</th>
						<th class="text-center col-md-2">Data de emissão</th>
						<th class="text-center col-md-2">Imprimir</th>
					</tr>
				</thead>
				<tbody>
					<tr >
						<td class="text-center" />
						<td class="text-center"  />
						<td class="text-center"  />
						<td class="text-center">
							<a class="btn btn-link btn-xs" >
								<span class="bi bi-printer-fill ws-color-gray"></span>
							</a>
						</td>
					</tr>
				</tbody>
			</table>
		</div>
	</div>
</section>
</html>
