<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layoutPadrao}">

<head>
	<title>Oficina</title>
</head>

<section layout:fragment="conteudo">

 <form class="form-horizontal" method="POST" action="/orcamento" >

	<div class="card">
		<div class="card-header">
			<div class="clearfix">
				<h5 class="card-title aw-titulo-panel">Pesquisa de Orçamentos</h5> 
				<a class="link-offset-2 link-offset-3-hover link-underline link-underline-opacity-0 
	  							link-underline-opacity-75-hover" href="/index">
  							Voltar para listagem
				</a>
			</div>
		</div>
		
		<div class="alert alert-danger" role="alert"> 
			<span class="bi bi-exclamation-circle-fill" aria-hidden="true"></span>
			<span class="sr-only"></span>
			   Orçamentos com mais de 30 dias serão excluídos automaticamente do sistema
		</div>	
		
		<div class="panel-body">
			<table class="table table-bordered table-striped">
				
				<thead>
					<tr>
						<th class="text-center">Número Orçamento</th>
						<th class="text-center col-md-2">Cliente</th>
						<th class="text-center col-md-2">Data de emissão</th>
						<th class="text-center col-md-2">Ações</th>
					</tr>
				</thead>
				<tbody>
					<tr th:if="${listaOrcamentos.empty}">
						<td colspan="4">Não há orçamentos</td>
					</tr>
					<tr th:each="orcamento: ${listaOrcamentos}">
						<td class="text-center" th:text="${orcamento.numOrcamento}"/>
						<td class="text-center" th:text="${orcamento.nome}" />
						<td class="text-center" th:text="${{orcamento.dataEmissao}}"/>
						<td class="text-center">
							
							<input class="btn btn-link btn-xs" type="submit">
								<span class="bi bi-printer-fill ws-color-gray"></span>
							</input>
							
							<a class="btn btn-link btn-xs" th:href="@{/gerar-orcamento}">
								<span class="bi bi-printer-fill ws-color-gray"></span>
							</a>
							<a class="btn btn-link btn-xs" >
								<span class="bi bi-whatsapp ws-color-gray"></span>
							</a>
						</td>
					</tr>
				</tbody>
				
			</table>
				<nav aria-label="Page navigation example">
					  <ul class="pagination">
					    <li class="page-item"><a class="page-link" href="#">anterior</a></li>
					    <li class="page-item"><a class="page-link" href="#">1</a></li>
					    <li class="page-item"><a class="page-link" href="#">2</a></li>
					    <li class="page-item"><a class="page-link" href="#">3</a></li>
					    <li class="page-item"><a class="page-link" href="#">próximo</a></li>
					  </ul>
					</nav>
			
		</div>
	</div>
</section>
</html>
