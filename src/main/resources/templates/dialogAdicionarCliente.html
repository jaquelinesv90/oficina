<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">


<div class="modal fade" id="pesquisaClienteModal" tabindex="-1" data-keyboard="false" data-backdrop="static">
	<div class="modal-dialog">

		<form action="/agendamento/pesquisa" method="GET" th:object="${nome}">

			<div class="modal-content">
				<div class="modal-header">
					<h4 class="modal-title">Pesquisar cliente</h4>
				</div>

				<div class="modal-body">
				
					<div class="panel-body">
						  <div class="col-lg-7">
							  <div class="input-group">
							     <input type="text"  th:field="*{nome}" id="nome" name="nome"
							     			 class="form-control" placeholder="Digite o nome do Cliente"></input>
							     <span class="input-group-btn">
							        <button class="btn btn-default" type="submit">Pesquisar</button>
							     </span>
							 </div>
						  </div>
</form>
						<table class="table table-bordered table-striped">

							<thead>
								<tr>
									<th class="text-center">Nome</th>
								</tr>
							</thead>
							<tbody>
								<div class="col-lg-7">
									<tr th:each="cliente: ${clientePesquisado}">
										<input type="text" class="form-control" placeholder="Digite o nome do Cliente"></input>
										<span class="input-group-btn">
								       	 	<button class="btn btn-default" type="button">Adicionar</button>
								      	</span>	
									</tr>
								</div>	
							</tbody>
													 
						</table>
					</div>
				</div>
				</div>

				<div class="modal-footer">
					<button type="button" class="btn btn-link" data-dismiss="modal">Cancelar</button>
				</div>
		
		</div>
	</div>
</html>
