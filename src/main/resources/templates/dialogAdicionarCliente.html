<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">


<div class="modal fade" id="pesquisaClienteModal" tabindex="-1" data-keyboard="false" data-backdrop="static">
	<div class="modal-dialog">

		<form action="/servico" method="GET">

			<div class="modal-content">
				<div class="modal-header">
					<h4 class="modal-title">Pesquisar cliente</h4>
				</div>

				<div class="modal-body">
					<div class="panel-body">
						<div class="form-group">
							<label for="nome" class="col-sm-2 control-label">Nome</label>
							<div class="col-sm-4">
								<input type="text" class="form-control" id="nome" name="nome" />
							</div>
						</div>

						<div class="form-group">
							<div class="col-sm-offset-2 col-sm-10">
								<button type="submit" class="btn btn-primary">Pesquisar</button>
							</div>
						</div>

						<table class="table table-bordered table-striped">

							<thead>
								<tr>
									<th>Nome</th>
								</tr>
							</thead>
							<tbody>
								<tr th:each="cliente: ${clientePesquisado}">
									<td class="text-center" th:text="${cliente.nome}" />
								</tr>
							</tbody>
						</table>
					</div>
				</div>

				<div class="modal-footer">
					<button type="button" class="btn btn-link" data-dismiss="modal">Cancelar</button>
				</div>
			</div>
		</form>
	</div>
</div>
</html>
