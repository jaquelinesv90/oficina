<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
    xmlns:th="http://www.thymeleaf.org"
 	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layoutPadrao}">

<head>
	<title>Oficina</title>
	
	<script type="javascript">
		function show(){
			alert("ENTROU")
		}
		
		
	
	</script>
	
</head>

<section layout:fragment="conteudo">
    
    <form class="form-horizontal" method="POST" action="/cliente" th:object="${cliente}">
    
    	<div class="alert alert-success" th:if="${!#strings.isEmpty(mensagem)}">
    		<span th:text="${mensagem}">Cliente salvo com sucesso!</span>
    	</div>
    
    	<div class="card">
    		<div class="card-body">
    			<div class="clearfix">
    				<h5 class="card-title aw-titulo-panel">Novo Cliente</h5>
	  				<a class="link-offset-2 link-offset-3-hover link-underline link-underline-opacity-0 
	  							link-underline-opacity-75-hover" href="/index">
  							Voltar para listagem
					</a>
    			</div>
    		</div>
    		
    		<div class="panel-body">
				<div class="form-group">
					<label for="nome" class="col-sm-2 control-label">Nome*</label>
					<div class="col-sm-4"> 
						<input type="text" class="form-control" id="nome"  th:field="*{nome}"/>
					</div>
				</div>
				
				<div class="form-group">
					<label for="cpf" class="col-sm-2 control-label">Cpf</label>
					<div class="col-sm-4"> 
						<input type="text" class="form-control" id="cpf"  th:field="*{cpf}"/>
					</div>
				</div>
				
				<div class="form-group">
					<label for="endereco" class="col-sm-2 control-label">Endereço</label>
					<div class="col-sm-4"> 
						<input type="text" class="form-control" id="endereco" th:field="*{endereco.rua}"/>
					</div>
				</div>
				
				<div class="form-group">
					<label for="numero" class="col-sm-2 control-label">Número</label>
					<div class="col-sm-4"> 
						<input type="text" class="form-control" id="numero" th:field="*{endereco.numero}"/>
					</div>
				</div>
				
				<div class="form-group">
					<label for="cidade" class="col-sm-2 control-label">Cidade</label>
					<div class="col-sm-4"> 
						<input type="text" class="form-control" id="cidade" th:field="*{endereco.cidade}"/>
					</div>
				</div>
				
				<div class="form-group">
					<label for="estado" class="col-sm-2 control-label">Estado</label>
					<div class="col-sm-4"> 
						<input type="text" class="form-control" id="estado" th:field="*{endereco.estado}"/>
					</div>
				</div>
				
				<div class="form-group">
					<label for="celular" class="col-sm-2 control-label">Celular*</label>
					<div class="col-sm-2">   
						<input type="text" class="form-control" id="celular" th:field="*{celular}"/>
					</div>
				</div>
				
				<div class="form-group">
					<label for="telefone" class="col-sm-2 control-label">Telefone</label>
					<div class="col-sm-2">   
						<input type="text" class="form-control" id="telefone" th:field="*{telefone}"/>
					</div>
				</div>
				
				<div class="form-group">
					<label for="placa" class="col-sm-2 control-label">Placa</label>
					<div class="col-sm-2"> 
						<div th:each="carro :${listaCarros}">  
							<input type="text" class="form-control" id="placa" th:value="${carro.placa}"/>
						</div>
					</div>
				</div>
				
				<div class="form-group">
					<label for="marca" class="col-sm-2 control-label">Marca</label>
					<div class="col-sm-2">
						<select class="form-control" id="marca">
	   						<option th:each="option : ${listaMarcas}" th:value="${option.nome}" th:text="${option.nome}"></option>	
						</select>
					</div>
				</div>
				
				<div class="form-group">
					<label for="modelo" class="col-sm-2 control-label">Modelo</label>
					<div class="col-sm-2">
						<select class="form-control" id="modelo">
							<option th:each="option : ${listaModelo}" th:value="${option.modelo}" th:text="${option.modelo}"></option>
						</select>
					</div>
				</div>
				
				<div class="form-group">
					<label for="ano" class="col-sm-2 control-label">Ano</label>
					<div class="col-sm-2"> 
						<div th:each="carro :${listaCarros}">  
								<input type="text" class="form-control" id="ano" th:value="${carro.ano}"/>
						</div>
					</div>
				</div>
				
				<div class="form-group">
					<label for="cor" class="col-sm-2 control-label">Cor</label>
					<div class="col-sm-2"> 
						<div th:each="carro :${listaCarros}"> 
							<input type="text" class="form-control" id="cor" th:value="${carro.cor}"/>
						</div>
					</div>
				</div>
				
				
				<div class="col-sm-offset-2 col-sm-10">
					<button type="submit" class="btn btn-primary">Salvar</button>
				</div>
			</div>
    	</div>
    </form>
</html>
