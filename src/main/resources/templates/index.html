<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layoutPadrao}">

<head>
	<title>Página Inicial</title>
</head>

<section layout:fragment="conteudo">
	<div class="alinhar-botoes">
		<a class="glyphicon glyphicon-search btn btn-default btn-lg" href="/pesquisar">Pesquisar</a>
	
		<a class="glyphicon glyphicon-pencil btn btn-default btn-lg"  href="/cliente/novo">Novo</a>
		
		<a class="glyphicon glyphicon-calendar btn btn-default btn-lg" href="/agendamento/novo">Agendar</a>
		
		<a class="glyphicon glyphicon-wrench btn btn-default btn-lg" href="/orcamento">Orçamento</a>
		
		<a class="glyphicon glyphicon-stats btn btn-default btn-lg">Relatorios</a>
		
	</div>

	<div class="panel panel-default">
		<div class="panel-heading">
			<h1 class="panel-title" th:text="'Clientes agendados para data de hoje: ' + ${dataAtual}"></h1>
		</div>

		<div class="panel-body">
			<table class="table table-bordered table-striped">
				
				<thead>
					<tr>
						<th class="text-center">Nome</th>
						<th class="text-center col-md-2">Horário</th>
						<th class="text-center col-md-2">Status</th>
						<th class="text-center col-md-2">Ações</th>
					</tr>
				</thead>
				<tbody>
					<tr th:if="${listaclientes.empty}">
						<td colspan="4">Não há clientes agendados</td>
					</tr>
					<tr th:each="cliente: ${listaclientes}">
						<td class="text-center" th:text="${cliente.cliente.nome}" />
						<td class="text-center" th:text="${cliente.horario}" />
						
						<td class="text-center">
							<span class="label" th:text="${cliente.statusServico.descricao}"
											th:classappend="${cliente.feito ? 'label-success':'label-danger'}"></span>
						</td>
						
						<td class="text-center">
							<a class="btn btn-link btn-xs" title="Editar agendamento" rel="tooltip" data-placement="top">
								<span class="glyphicon glyphicon-pencil"></span>
							</a>
							<a class="btn btn-link btn-xs" title="Marcar como Feito" rel="tooltip" data-placement="top">
								<span class="glyphicon glyphicon-ok"></span>
							</a>
							<a class="btn btn-link btn-xs" title="Excluir agendamento" rel="tooltip" data-placement="top">
								<span class="glyphicon glyphicon-trash"></span>
							</a>
						</td>
					</tr>
				</tbody>
			</table>
		</div>
	</div>
</section>
</html>
